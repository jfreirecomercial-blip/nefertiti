# Firebase App Hosting environment configuration
# This file defines environment variables available during build and runtime.
# See: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Minimum number of instances to keep warm (0 = scale to zero)
  minInstances: 0
  # Maximum number of concurrent requests per instance
  concurrency: 80
  # Memory limit per instance
  memoryMiB: 512
  # CPU limit
  cpu: 1

env:
  # Firebase Client SDK Configuration (public, available at build time)
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyBsW6_n5LRpTLNgp5Lcb_i58vweFCxX0l8
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: kupom-311fe.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
